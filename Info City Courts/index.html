<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFO CITY COURTS - Choose Your Role</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .choice-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
            padding: 20px;
        }
        .choice-card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 30px;
            text-align: center;
            margin: 20px;
            max-width: 300px;
            transition: transform 0.3s ease;
        }
        .choice-card:hover {
            transform: translateY(-5px);
        }
        .choice-card i {
            font-size: 3em;
            color: #ff6b35;
            margin-bottom: 20px;
        }
        .choice-card h3 {
            margin-bottom: 15px;
            color: #333;
        }
        .choice-card p {
            margin-bottom: 20px;
            color: #666;
        }
        .btn-choice {
            background: #ff6b35;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s ease;
        }
        .btn-choice:hover {
            background: #e55a2b;
        }
    </style>
</head>
<body>
    <header style="background: #333; color: white; padding: 20px 0;">
        <div class="container" style="text-align: center;">
            <h1>INFO CITY COURTS</h1>
            <p>Choose your role to get started</p>
        </div>
    </header>

    <section class="choice-container">
        <div class="choice-card">
            <i class="fas fa-user"></i>
            <h3>Customer</h3>
            <p>Order delicious food online from our restaurants</p>
            <button class="btn-choice" onclick="window.location.href='register_customer.html'">Register as Customer</button>
        </div>
        <div class="choice-card">
            <i class="fas fa-utensils"></i>
            <h3>Restaurant</h3>
            <p>Manage your restaurant and handle orders</p>
            <button class="btn-choice" onclick="window.location.href='register_restaurant.html'">Register as Restaurant</button>
        </div>
        <div class="choice-card">
            <i class="fas fa-building"></i>
            <h3>Food Courts</h3>
            <p>Oversee food court operations</p>
            <button class="btn-choice" onclick="window.location.href='register_foodcourt.html'">Register as Food Court</button>
        </div>
    </section>

    <footer style="background: #333; color: white; text-align: center; padding: 20px 0; position: fixed; bottom: 0; width: 100%;">
        <p>&copy; 2025 INFO CITY COURTS. All rights reserved.</p>
    </footer>
</body>
</html>
