<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Test - INFO CITY COURTS</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
        .test-form { background: #f5f5f5; padding: 20px; border-radius: 8px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, textarea { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        button { background: #ff6b35; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #e55a2b; }
        .status { margin-top: 20px; padding: 10px; border-radius: 4px; display: none; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script>
        (function(){
            emailjs.init("YOUR_PUBLIC_KEY"); // Replace with your EmailJS public key
        })();
    </script>
</head>
<body>
    <h1>Email Test for Contact Form</h1>
    <p>Use this form to test if your EmailJS setup is working correctly.</p>

    <div class="test-form">
        <div class="form-group">
            <label for="testName">Your Name:</label>
            <input type="text" id="testName" value="Test User">
        </div>
        <div class="form-group">
            <label for="testEmail">Your Email:</label>
            <input type="email" id="testEmail" value="test@example.com">
        </div>
        <div class="form-group">
            <label for="testMessage">Test Message:</label>
            <textarea id="testMessage" rows="4">This is a test message to verify that the EmailJS setup is working correctly. If you receive this email, the contact form will work properly.</textarea>
        </div>
        <button onclick="sendTestEmail()">Send Test Email</button>
    </div>

    <div id="status" class="status"></div>

    <script>
        function sendTestEmail() {
            const name = document.getElementById('testName').value;
            const email = document.getElementById('testEmail').value;
            const message = document.getElementById('testMessage').value;

            const statusDiv = document.getElementById('status');
            const button = document.querySelector('button');

            // Show loading
            button.textContent = 'Sending...';
            button.disabled = true;
            statusDiv.style.display = 'none';

            emailjs.send("YOUR_SERVICE_ID", "YOUR_TEMPLATE_ID", {
                from_name: name,
                from_email: email,
                message: message,
                to_email: "biswajeet.chakra2012@gmail.com",
                reply_to: email,
                current_date: new Date().toLocaleDateString()
            })
            .then(function(response) {
                console.log('SUCCESS!', response.status, response.text);
                statusDiv.className = 'status success';
                statusDiv.textContent = '✅ Test email sent successfully! Check biswajeet.chakra2012@gmail.com';
                statusDiv.style.display = 'block';
                button.textContent = 'Send Test Email';
                button.disabled = false;
            }, function(error) {
                console.log('FAILED...', error);
                statusDiv.className = 'status error';
                statusDiv.textContent = '❌ Failed to send test email. Check console for details and verify your EmailJS setup.';
                statusDiv.style.display = 'block';
                button.textContent = 'Send Test Email';
                button.disabled = false;
            });
        }
    </script>
</body>
</html>
